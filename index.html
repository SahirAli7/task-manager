<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>
    <form id="taskForm">
      <input type="text" id="taskInput" placeholder="Enter a new task..." maxlength="200" required>
      <button type="submit">Add Task</button>
    </form>
    <ul id="taskList"></ul>
    <p id="emptyState" class="empty-state">No tasks yet. Add one above to get started!</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
